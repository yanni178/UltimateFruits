
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Fruits - UNIVERSO</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#040014;
color:white;
}

/* CANVAS */
#universe{
position:fixed;
inset:0;
z-index:-1;
}

/* TÍTULO */
h1{
text-align:center;
margin:25px 0;
font-size:2.8em;
background:linear-gradient(90deg,#ff00ff,#00ffff,#ff00ff);
background-size:300%;
-webkit-background-clip:text;
color:transparent;
animation:shine 6s linear infinite;
}
@keyframes shine{
0%{background-position:0%}
100%{background-position:300%}
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding-bottom:100px;
}

.card{
width:210px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 30px rgba(255,0,255,.4);
text-align:center;
transition:.4s;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.card:hover{
transform:scale(1.07);
box-shadow:0 0 60px #00ffff;
}

.card button{
margin-top:12px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff00ff,#00ffff);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px #ff00ff;
}

/* CARRINHO */
#cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:rgba(10,0,30,.95);
border-left:2px solid #ff00ff;
padding:20px;
transition:.4s;
z-index:10;
}
#cart.open{right:0}

.cart-item{
border-bottom:1px solid #ff00ff;
padding:6px 0;
}

.total{
margin-top:10px;
font-weight:bold;
}

.finish{
margin-top:12px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#00ffaa;
cursor:pointer;
font-weight:bold;
}

/* MODAL */
#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}
.box{
background:#120030;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 0 50px #ff00ff;
}
.box input,.box select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}
.qr{text-align:center;margin-top:10px}
</style>
</head>

<body>

<canvas id="universe"></canvas>
<h1>🌌 ULTIMATE FRUITS 🌌</h1>

<div class="cards" id="cards"></div>

<div id="cart">
<h2>🛒 Carrinho</h2>
<div id="cartItems"></div>
<div class="total" id="total">Total: R$ 0.00</div>
<button class="finish" onclick="openModal()">Finalizar</button>
</div>

<div id="modal">
<div class="box">
<h3>Pagamento</h3>
<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<select id="metodo">
<option value="pix">PIX</option>
<option value="cartao">Cartão</option>
<option value="boleto">Boleto</option>
</select>
<div class="qr" id="qr"></div>
<button class="finish" onclick="pagar()">Pagar</button>
</div>
</div>

<script>
// ===== FUNDO UNIVERSO =====
const canvas=document.getElementById("universe");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
window.onresize=resize;resize();

let stars=[];
for(let i=0;i<180;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-.5)*0.3,
dy:(Math.random()-.5)*0.3
});
}

function animate(){
ctx.fillStyle="#040014";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
stars.forEach(s=>{
s.x+=s.dx;
s.y+=s.dy;
if(s.x<0||s.x>canvas.width) s.dx*=-1;
if(s.y<0||s.y>canvas.height) s.dy*=-1;

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

// ===== PRODUTOS ORDENADOS =====
const products=[
{name:"Shadow",price:8},
{name:"Trex",price:9.5},
{name:"Venom",price:10},
{name:"Tiger",price:13.5}
].sort((a,b)=>a.price-b.price);

const container=document.getElementById("cards");
products.forEach(p=>{
const el=document.createElement("div");
el.className="card";
el.innerHTML=`
<h3>${p.name}</h3>
<p>R$ ${p.price.toFixed(2)}</p>
<button onclick="add('${p.name}',${p.price})">Comprar</button>
`;
container.appendChild(el);
});

// ===== CARRINHO =====
let cart=[];
function add(name,price){
cart.push({name,price});
render();
document.getElementById("cart").classList.add("open");
}

function render(){
let total=0;
const div=document.getElementById("cartItems");
div.innerHTML="";
cart.forEach(i=>{
total+=i.price;
div.innerHTML+=`<div class="cart-item">${i.name} - R$ ${i.price.toFixed(2)}</div>`;
});
document.getElementById("total").textContent="Total: R$ "+total.toFixed(2);
}

// ===== PAGAMENTO =====
function openModal(){
document.getElementById("modal").style.display="flex";
}

function pagar(){
const nome=document.getElementById("nome").value;
const cpf=document.getElementById("cpf").value;
const metodo=document.getElementById("metodo").value;
if(!nome||!cpf){alert("Preencha os dados");return;}
let total=cart.reduce((a,b)=>a+b.price,0);

if(metodo==="pix"){
const pix="46786167802";
document.getElementById("qr").innerHTML=
`<p>PIX: ${pix}</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?data=${pix}&size=150x150">`;
}

alert("Pagamento confirmado 🚀 Total: R$ "+total.toFixed(2));
cart=[];
render();
}
</script>

</body>
</html>
