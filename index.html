<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Fruits</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#060018;
color:white;
overflow-x:hidden;
overflow-y:auto;
}

/* FUNDO */
#bg{
position:fixed;
inset:0;
z-index:-1;
}

/* TÍTULO */
h1{
text-align:center;
margin:25px 0;
font-size:2.3em;
background:linear-gradient(90deg,#ff00ff,#7a5cff,#ff00ff);
background-size:300%;
-webkit-background-clip:text;
color:transparent;
animation:shine 6s linear infinite;
}
@keyframes shine{
0%{background-position:0%}
100%{background-position:300%}
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding-bottom:140px;
}

.card{
width:200px;
padding:18px;
border-radius:16px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 0 25px rgba(255,0,255,.35);
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 0 45px #00ffff;
}

.card button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff00ff,#00ffff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* BOTÃO CARRINHO */
.cartBtn{
position:fixed;
right:15px;
bottom:15px;
padding:16px;
border:none;
border-radius:50%;
background:#ff00ff;
color:white;
font-size:20px;
box-shadow:0 0 20px #ff00ff;
cursor:pointer;
z-index:100;
}

/* CARRINHO */
#cart{
position:fixed;
right:-340px;
top:0;
width:300px;
height:100%;
background:rgba(15,0,40,.96);
border-left:2px solid #ff00ff;
padding:18px;
transition:.35s;
z-index:20;
}
#cart.open{right:0}

.cart-item{
border-bottom:1px solid #ff00ff;
padding:6px 0;
font-size:.9em;
}

.total{
margin-top:10px;
font-weight:bold;
}

.finish{
margin-top:12px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#00ffaa;
font-weight:bold;
cursor:pointer;
}

/* MODAL */
#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
z-index:30;
}

.box{
background:#140033;
padding:22px;
border-radius:14px;
width:300px;
box-shadow:0 0 45px #ff00ff;
}

.box input,.box select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

/* NOTIFICAÇÃO */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%) translateY(80px);
background:#00ffaa;
color:#002b22;
padding:14px 22px;
border-radius:12px;
font-weight:bold;
opacity:0;
transition:.4s;
z-index:50;
}
#toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>🌌 ULTIMATE FRUITS 🌌</h1>

<div class="cards" id="cards"></div>

<button class="cartBtn" onclick="toggleCart()">🛒</button>

<div id="cart">
<h2>🛒 Carrinho</h2>
<div id="cartItems"></div>
<div class="total" id="total">Total: R$ 0.00</div>
<button class="finish" onclick="abrirPagamento()">Finalizar</button>
</div>

<div id="modal">
<div class="box">
<h3>Pagamento</h3>
<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<select id="metodo">
<option value="pix">PIX</option>
<option value="cartao">Cartão</option>
<option value="boleto">Boleto</option>
</select>
<div id="qr" style="text-align:center;margin-top:8px"></div>
<button class="finish" onclick="pagar()">Pagar</button>
</div>
</div>

<div id="toast">✅ Pagamento realizado!</div>

<script>
// FUNDO GALÁXIA
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
window.onresize=resize;
resize();

let stars=[];
for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-.5)*0.2,
dy:(Math.random()-.5)*0.2
});
}

function animate(){
ctx.fillStyle="#060018";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(s=>{
s.x+=s.dx;
s.y+=s.dy;
if(s.x<0||s.x>canvas.width) s.dx*=-1;
if(s.y<0||s.y>canvas.height) s.dy*=-1;
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

// PRODUTOS ORDENADOS
const products=[
{name:"Shadow",price:8},
{name:"Trex",price:9.5},
{name:"Venom",price:10},
{name:"Tiger",price:13.5}
].sort((a,b)=>a.price-b.price);

const container=document.getElementById("cards");

products.forEach(p=>{
const el=document.createElement("div");
el.className="card";
el.innerHTML=`
<h3>${p.name}</h3>
<p>R$ ${p.price.toFixed(2)}</p>
<button onclick="addCarrinho('${p.name}',${p.price})">Comprar</button>
`;
container.appendChild(el);
});

// CARRINHO
let cart=[];

function addCarrinho(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let total=0;
const div=document.getElementById("cartItems");
div.innerHTML="";
cart.forEach(i=>{
total+=i.price;
div.innerHTML+=`<div class="cart-item">${i.name} - R$ ${i.price.toFixed(2)}</div>`;
});
document.getElementById("total").textContent="Total: R$ "+total.toFixed(2);
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

// PAGAMENTO
function abrirPagamento(){
document.getElementById("modal").style.display="flex";
}

function pagar(){
const nome=document.getElementById("nome").value;
const cpf=document.getElementById("cpf").value;
if(!nome||!cpf) return;

cart=[];
renderCart();
document.getElementById("modal").style.display="none";

const toast=document.getElementById("toast");
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2500);
}
</script>

</body>
</html>
