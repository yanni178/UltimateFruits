


<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Storm</title>

<style>
/* ===== BASE ===== */
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#12002b;
color:white;
overflow-x:hidden;
animation:fadePage .8s ease;
}

/* ===== INTRO ===== */
#intro{
position:fixed;
inset:0;
background:radial-gradient(circle,#1a0033,#000);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
animation:introOut 1s ease forwards;
animation-delay:3s;
}

#intro h1{
font-size:2.4em;
letter-spacing:4px;
background:linear-gradient(90deg,#ff00ff,#00ffff,#ff00ff);
background-size:300%;
-webkit-background-clip:text;
color:transparent;
animation:logoZoom 2s ease, shine 2s linear infinite;
filter:drop-shadow(0 0 25px #ff00ff);
}

@keyframes logoZoom{
from{transform:scale(.4);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes shine{
0%{background-position:0%;}
100%{background-position:300%;}
}

@keyframes introOut{
to{opacity:0;visibility:hidden;}
}

@keyframes fadePage{
from{opacity:0;}
to{opacity:1;}
}

/* ===== FUNDO ===== */
#bg{
position:fixed;
inset:0;
z-index:-1;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
width:100%;
height:60px;
background:rgba(10,0,30,.85);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid rgba(255,0,255,.3);
z-index:100;
}

.logo{
font-weight:bold;
background:linear-gradient(90deg,#ff00ff,#00ffff);
-webkit-background-clip:text;
color:transparent;
animation:logoGlow 2s infinite alternate;
}

@keyframes logoGlow{
from{filter:drop-shadow(0 0 5px #ff00ff);}
to{filter:drop-shadow(0 0 18px #00ffff);}
}

.stats{
font-size:.8em;
color:#00ffaa;
}

/* ===== CONTEÚDO ===== */
h1{
margin-top:100px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px 20px 80px;
}

.card{
padding:18px;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 0 25px rgba(255,0,255,.35);
text-align:center;
transition:.25s;
opacity:0;
transform:translateY(40px);
animation:cardUp .6s ease forwards;
}

.card:nth-child(1){animation-delay:.1s;}
.card:nth-child(2){animation-delay:.2s;}
.card:nth-child(3){animation-delay:.3s;}
.card:nth-child(4){animation-delay:.4s;}

@keyframes cardUp{
to{opacity:1;transform:translateY(0);}
}

.price{
color:#00ffaa;
margin:10px 0;
font-weight:bold;
}

.card button{
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff00ff,#00ffff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* ===== ADMIN ===== */
#adminPanel{
position:fixed;
bottom:10px;
left:10px;
background:#140033;
padding:14px;
border-radius:12px;
box-shadow:0 0 25px #ff00ff;
display:none;
z-index:200;
font-size:.85em;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>INFINITY STORM</h1>
</div>

<canvas id="bg"></canvas>

<header>
<div class="logo">INFINITY STORM</div>
<div class="stats">
Pedidos: <span id="pedidos">0</span> |
R$ <span id="faturamento">0.00</span>
</div>
</header>

<h1>🌌 Loja Oficial 🌌</h1>

<div class="cards" id="cards"></div>

<div id="adminPanel">
<b>🔐 Admin</b><br>
Pedidos: <span id="adminPedidos">0</span><br>
Faturado: R$ <span id="adminFaturamento">0.00</span><br>
<button onclick="resetar()">Resetar</button>
</div>

<script>
/* remover intro */
setTimeout(()=>{
const intro=document.getElementById("intro");
if(intro) intro.remove();
},4000);

/* ===== UNIVERSO ===== */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
window.addEventListener("resize",resize);
resize();

const stars=[];
for(let i=0;i<200;i++){
stars.push({
x:(Math.random()-0.5)*canvas.width,
y:(Math.random()-0.5)*canvas.height,
z:Math.random()*canvas.width,
size:Math.random()*2+0.5
});
}

function animate(){
ctx.fillStyle="#12002b";
ctx.fillRect(0,0,canvas.width,canvas.height);

const cx=canvas.width/2;
const cy=canvas.height/2;

stars.forEach(s=>{
s.z-=2;
if(s.z<=1){
s.z=canvas.width;
s.x=(Math.random()-0.5)*canvas.width;
s.y=(Math.random()-0.5)*canvas.height;
}

const k=128/s.z;
const px=s.x*k+cx;
const py=s.y*k+cy;

ctx.beginPath();
ctx.fillStyle="rgba(255,120,255,0.9)";
ctx.arc(px,py,s.size*k,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();

/* ===== LOJA ===== */
const NUMERO_WHATS="5516981901910 ";

let pedidos=parseInt(localStorage.getItem("pedidos")||0);
let faturamento=parseFloat(localStorage.getItem("faturamento")||0);

function atualizar(){
document.getElementById("pedidos").textContent=pedidos;
document.getElementById("faturamento").textContent=faturamento.toFixed(2);
document.getElementById("adminPedidos").textContent=pedidos;
document.getElementById("adminFaturamento").textContent=faturamento.toFixed(2);
}
atualizar();

const products = [
  { name: "Venom", price: 10 },
  { name: "Control", price: 40.9 },
  { name: "~Conta?", price: 137.50 },

  { name: "Gravity", price: 9.00 },
  { name: "Spirit", price: 12.50 },
  { name: "Dough", price: 13.50 },
  { name: "Yeti", price: 14.00 }

].sort((a, b) => a.price - b.price);



const container=document.getElementById("cards");

products.forEach(p=>{
container.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<div class="price">R$ ${p.price.toFixed(2)}</div>
<button onclick="comprar('${p.name}',${p.price})">Comprar</button>
</div>
`;
});

function comprar(produto,preco){
const nome=prompt("Digite seu nome:");
if(!nome) return;

pedidos++;
faturamento+=preco;

localStorage.setItem("pedidos",pedidos);
localStorage.setItem("faturamento",faturamento);
atualizar();

const msg=
`🚀 NOVO PEDIDO

👤 Nome: ${nome}
🛒 Produto: ${produto}
💰 Valor: R$ ${preco.toFixed(2)}
Pedido Nº: ${pedidos}`;

window.open(`https://wa.me/${NUMERO_WHATS}?text=${encodeURIComponent(msg)}`,"_blank");
}

/* ===== ADMIN SECRETO ===== */
let segredo="";
document.addEventListener("keydown",e=>{
segredo+=e.key;
if(segredo.includes("admin123")){
document.getElementById("adminPanel").style.display="block";
}
});

function resetar(){
localStorage.clear();
location.reload();
}
</script>

</body>
</html>
